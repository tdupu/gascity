# Hyperscale — 100-agent K8s demo pack.
#
# A single worker pool that scales to 100 pods. Each worker picks up one
# bead, marks it done, and exits. Designed for the "shock and awe" demo:
# seed 100 beads, watch 100 pods materialize, then drain.
#
# Usage:
#   gc init --from examples/hyperscale ~/hyperscale-demo
#   gc build-image examples/hyperscale --tag gc-hyperscale:latest
#   ./contrib/demo/seed-hyperscale.sh 100 ~/hyperscale-demo
#   cd ~/hyperscale-demo && gc start

[workspace]
name = "hyperscale"
provider = "claude"
isolation = "none"

[providers.claude]
base = "builtin:claude"

[imports.hyperscale]
source = "packs/hyperscale"

[session]
provider = "k8s"

[session.k8s]
namespace = "gc"
cpu_request = "50m"
mem_request = "128Mi"
cpu_limit = "200m"
mem_limit = "256Mi"
prebaked = true

[daemon]
patrol_interval = "10s"
max_restarts = 3
restart_window = "5m"
shutdown_timeout = "10s"
# Coalesce bursty event-driven ticks (pokes, control-dispatcher signals)
# within this window. Zero (default) disables debouncing. Trade reactivity
# for fewer bd subprocess fans-out when the reconciler is being poked
# rapidly. Recommended starting value when tuning: 500ms.
tick_debounce = "500ms"

# Builtin packs compose through explicit imports; the gc binary pre-seeds
# these pinned versions offline from its embedded content. Pinning a
# different commit fetches that commit from git like any remote import.
# The builtin-pack-imports doctor check repairs missing entries.
[imports.core]
source = "https://github.com/gastownhall/gascity.git//internal/bootstrap/packs/core"
version = "sha:f895c0ff47d6ee9334ed282a416387eb5b084d24"

[imports.bd]
source = "https://github.com/gastownhall/gascity.git//examples/bd"
version = "sha:f895c0ff47d6ee9334ed282a416387eb5b084d24"
