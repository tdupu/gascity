# Lifecycle — hierarchical pack with deterministic scripted agents.
#
# Polecats work in isolated worktrees on feature branches. When done,
# they hand off to the refinery which merges to main. Same lifecycle as
# Gas Town's polecat/refinery, but with scripted agents for reproducible demos.
#
# All agents use start_command (gc agent-script, driven by YAML
# agent-scripts) for deterministic, reproducible demo recordings.
#
# To use:
#   gc init --from examples/lifecycle ~/demo-city
#   cd ~/demo-city
#   gc start
#
#   # Add a rig (lifecycle pack is included automatically):
#   gc rig add ~/demo-repo
#
#   # Route work to the polecat pool:
#   gc sling demo-repo/polecat "Write hello world"
#   bd show <bead-id> --watch

[workspace]
name = "lifecycle-demo"
start_command = "true"
# No workspace pack — all agents are rig-scoped.

[defaults.rig.imports.lifecycle]
source = "packs/lifecycle"

[daemon]
patrol_interval = "10s"
max_restarts = 3
restart_window = "5m"
shutdown_timeout = "5s"

# Builtin packs compose through explicit imports; the gc binary pre-seeds
# these pinned versions offline from its embedded content. Pinning a
# different commit fetches that commit from git like any remote import.
# The builtin-pack-imports doctor check repairs missing entries.
[imports.core]
source = "https://github.com/gastownhall/gascity.git//internal/bootstrap/packs/core"
version = "sha:f895c0ff47d6ee9334ed282a416387eb5b084d24"

[imports.bd]
source = "https://github.com/gastownhall/gascity.git//examples/bd"
version = "sha:f895c0ff47d6ee9334ed282a416387eb5b084d24"
