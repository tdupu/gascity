# gitleaks configuration: suppress known false positives
# Created 2026-06-30 to allow push of legitimate commits while blocking real secrets

[[rules]]
id = "suppress-control-test-false-positives"
description = "Suppress gitleaks false positives in control_test.go (test data metadata, not API keys)"
regex = "^.*$"
secretGroup = 0
keywords = []

[allowlist]
commits = [
  "955dfd28c44a5dad0e34837a510c4473a6fb8a65"  # Julian Knutsen - beadmeta test data false positive
]
paths = [
  "internal/dispatch/control_test.go"
]

# Alternative approach: suppress by fingerprint (gitleaks v8.10+)
[[allowlist.fingerprints]]
fingerprints = [
  "955dfd28c44a5dad0e34837a510c4473a6fb8a65:internal/dispatch/control_test.go:generic-api-key:2114",
  "955dfd28c44a5dad0e34837a510c4473a6fb8a65:internal/dispatch/control_test.go:generic-api-key:2122"
]
